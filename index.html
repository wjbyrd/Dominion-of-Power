2. DO NOT TOUCH (Core Engine)

<!DOCTYPE html>

<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
=========================================

This is the main gameplay panel.

Controls:
- size and layout of the game area
- background styling and effects
- visual feedback (glow, boss mode, hit effects)
- positioning of UI elements (autosave, etc.)

-----------------------------------------
SAFE TO EDIT:
- colors, shadows, glow effects
- padding, margins
- background / blur effects
- border styles
- animation intensity

-----------------------------------------
USE CAUTION:
- width / max-width / flex settings
- position: relative (needed for overlays like autosave)
- removing box-sizing may break layout

-----------------------------------------
DO NOT REMOVE:
- #gameBox selector (used throughout JS)
- .boss-mode class (boss visuals tied to logic)
- .hit class (damage feedback)

-----------------------------------------
TIP:
This controls how the game FEELS visually.
You can restyle it completely—just keep structure intact.

========================================= */
#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;
    background: radial-gradient(circle at center,
        rgba(76,29,149,0.4) 0%,
        rgba(20,0,30,0.9) 55%,
        rgba(0,0,0,0.98) 100%);
    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;
    box-shadow:
        0 0 25px rgba(109,40,217,0.3),
        0 0 80px rgba(127,29,29,0.25);
    border: 1px solid rgba(109,40,217,0.3);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #7c3aed;
    box-shadow:
        0 0 30px rgba(124,58,237,0.6),
        0 0 60px rgba(109,40,217,0.4);
}

.boss-icon{width: 28px;height: 28px;object-fit: contain;pointer-events: none;}

/* Tier 1 — Stability */
.boss10 .boss-icon{filter:drop-shadow(0 0 6px rgba(160,120,255,0.8))drop-shadow(0 0 12px rgba(120,80,255,0.5));}

/* Tier 2 — Control */
.boss20 .boss-icon{filter:drop-shadow(0 0 8px rgba(140,80,255,0.9))drop-shadow(0 0 16px rgba(100,40,220,0.6));}

/* Tier 3 — Dominion */
.boss30 .boss-icon{filter:drop-shadow(0 0 10px rgba(180,80,255,1))drop-shadow(0 0 22px rgba(120,0,255,0.8));}

/* Damage effect when boss/player is hit (visual feedback) */
.hit {box-shadow:0 0 60px rgba(153,27,27,0.9),inset 0 0 40px rgba(127,29,29,0.8) !important;animation: hitshake 0.4s ease;}

/* Autosave indicator — positioned relative to gameBox */
#autosave {position: absolute;top: 15px;right: 15px;font-size: 11px;opacity: 0.4;font-style: italic;color: #a78bfa;text-shadow: 0 0 6px rgba(167,139,250,0.4);}

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
=========================================
Controls all text styling in the game:
- question readability
- headers and titles
- boss emphasis text
- hints and feedback
- visual hierarchy
-----------------------------------------
SAFE TO EDIT:
- font sizes
- colors
- text shadows
- spacing (margin, line-height)
- stylistic effects (italic, uppercase, etc.)
-----------------------------------------
USE CAUTION:
- extreme font sizes (may break layout)
- removing margins (can cause overlap)
- removing contrast (hurts readability)
-----------------------------------------
DO NOT REMOVE:
- #question (core content display)
- .boss-title (boss transitions)
- .boss-q (boss summaries)
- .fade-out-text (feedback animation)
-----------------------------------------
TIP:
Prioritize readability over style.
If students can’t read it quickly, the system fails.
========================================= */
h2 { text-shadow: 0 0 10px rgba(255,255,255,0.25),  0 0 20px rgba(167,139,250,0.35); margin-bottom: 5px; }

/* Main question text — keep readable and centered */
#question { font-size: clamp(20px, 4vw, 22px); line-height: 1.4; font-weight: 600; margin: 14px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

/* Boss/summary title — high emphasis text */
.boss-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; display: block;color: #a78bfa;text-shadow:0 0 10px rgba(167,139,250,0.6), 0 0 25px rgba(109,40,217,0.4);}

/* Area/zone label — subtle contextual info */
.area-title { color: #9ca3af; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }

/* Boss summary text — left-aligned for readability */
.boss-q {font-style: normal; line-height: 1.5; font-size: 24px;border-left: 3px solid #7f1d1d; padding-left: 15px;margin: 20px 0;text-align: left; color: #e9d5ff; box-shadow: -4px 0 10px rgba(127,29,29,0.3);}

/* Optional hint display (calculation or guidance) */
.hint-box { font-size: 13px; color: #a78bfa; margin-top: 15px; opacity: 0.8; height: 18px; }
    
/* Temporary feedback text (auto fades out) */
.fade-out-text { animation: fadeOut 5s forwards; font-weight: bold; color: #c4b5fd; text-shadow: 0 0 6px rgba(167,139,250,0.5);}

/* Add styling to wizard text */
#message {margin-top: 10px; font-style: italic; letter-spacing: 0.5px; text-align: center; color: #cbd5f5; opacity: 0.85;}

/* Dominion override */
.dominion #message {color: #c4b5fd;font-size: 17px; font-style: italic; margin-top: 12px; margin-bottom: 6px; font-weight: 600; letter-spacing: 1px; text-shadow: 0 0 8px rgba(109,40,217,0.6);}
   
/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
=========================================
Controls all interactive elements:
- answer buttons
- hover/active feedback
- layout of answer choices
- utility buttons (fullscreen, etc.)
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- hover/active effects (scale, glow, etc.)
- padding, spacing, font sizes
- button shapes (border-radius)
-----------------------------------------
USE CAUTION:
- removing hover/active effects (reduces feedback)
- extreme sizing (can break layout or overlap)
- flex settings in .answers (affects layout)
-----------------------------------------
DO NOT REMOVE:
- button selector (used globally) 
- .answers layout (controls answer positioning)
-----------------------------------------
TIP:
Buttons should feel responsive and clickable.
Visual feedback = better engagement.
========================================= */

/* Base button styling — applies to all buttons */
button {padding: 12px 22px; margin: 6px; font-size: 16px; cursor: pointer;
    background: linear-gradient(180deg, #4c1d95, #1e1b4b);     color: #ede9fe;
    border: 1px solid rgba(167,139,250,0.4);
    border-radius: 8px;
    box-shadow:
       0 0 10px rgba(109,40,217,0.4),
       inset 0 0 10px rgba(0,0,0,0.5);
    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover { background: linear-gradient(180deg, #6d28d9, #4c1d95);
    box-shadow:
        0 0 20px rgba(167,139,250,0.7),
        0 0 35px rgba(109,40,217,0.5);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */
button:active {transform: scale(0.96);}

/* Answer container — controls layout of choices */
.answers { display: flex; flex-direction: column; justify-content: center; gap: 12px; width: 100%}

/* Individual answer buttons — flexible sizing */
.answers button { flex: 1 1 100%; min-height: 60px; max-width: 100%; padding: 15px; font-size: 18px; margin: 0; }

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {position: absolute;top: 12px;
left: 12px;padding: 6px 12px;font-size: 12px;letter-spacing: 1px;text-transform: uppercase;color: #e9d5ff;background: linear-gradient(180deg, #4c1d95, #1e1b4b);
border: 1px solid rgba(167,139,250,0.35);border-radius: 6px;cursor: pointer;box-shadow: 0 0 10px rgba(109,40,217,0.4), inset 0 0 6px rgba(0,0,0,0.6);
    transition: all 0.15s ease;
               }
.fullscreenBtn:active {transform: scale(0.95);box-shadow:0 0 8px rgba(109,40,217,0.3),inset 0 0 10px rgba(0,0,0,0.8);}

.continue-btn {background: linear-gradient(180deg, #6d28d9, #4c1d95);color: #ede9fe;font-weight: bold;padding: 14px 40px;font-size: 18px;border-radius: 8px;
border: 1px solid rgba(167,139,250,0.4);cursor: pointer; box-shadow:0 0 15px rgba(109,40,217,0.5),0 0 30px rgba(127,29,29,0.3);
transition: all 0.15s ease;}

.continue-btn:hover {background: linear-gradient(180deg, #7c3aed, #6d28d9);
box-shadow:0 0 25px rgba(167,139,250,0.7),0 0 40px rgba(109,40,217,0.5);transform: scale(1.03);}

#continueBtn:active {transform: scale(0.97);box-shadow:0 0 10px rgba(109,40,217,0.3), inset 0 0 10px rgba(0,0,0,0.6);}

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
=========================================
Controls visual progression feedback:
- progress bar (top fill indicator)
- maze track (30-room grid)
- current position highlight
- boss room visual cues
-----------------------------------------
SAFE TO EDIT:
- colors, gradients, glow effects
- sizes (maze-box, spacing, gap)
- animation styles (pulse, transitions)
- grid sizing (with care)
-----------------------------------------
USE CAUTION:
- grid-template-columns (affects layout structure)
- maze-box size vs spacing (can cause overflow)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT MODIFY:
- #mazeTrack structure (10 columns × 3 rows = 30 rooms)
- nth-child(10, 20, 30) unless boss rooms are changed globally

Changing boss room visuals here requires matching updates in:
- game logic (boss triggers)
- progression system
-----------------------------------------
TIP:
This system gives players a sense of movement and progress.
If it's unclear, motivation drops.
========================================= */
    
/* Progress bar container — background track */
#progressBar {width: 100%;height: 22px;background: linear-gradient(180deg,rgba(20,0,30,0.9),rgba(0,0,0,0.95));
border-radius: 12px;margin-bottom: 20px;overflow: hidden;box-shadow:inset 0 0 10px rgba(109,40,217,0.2);}
    
/* Progress fill — width controlled by JS */
#progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #4c1d95, #6d28d9, #991b1b); box-shadow:0 0 10px rgba(167,139,250,0.4);transition: width 0.4s ease;}

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack { display: grid; grid-template-columns: repeat(10, 36px); justify-content: center; gap: 10px; margin: 25px auto; }
    
/* Individual room cell — default state */
.maze-box { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; background: rgba(30, 10, 40, 0.5); border: 1px solid rgba(109,40,217,0.2); transition: all 0.3s ease; }

/* Current room highlight — animated pulse */
.maze-box.active { background: rgba(167,139,250,0.3); border: 2px solid #a78bfa; box-shadow: 0 0 10px rgba(167,139,250,0.7), 0 0 20px rgba(109,40,217,0.5);z-index: 10; animation: activePulse 1s infinite alternate;}

/* Completed tile */
.maze-box.completed {background: rgba(109,40,217,0.4); box-shadow: 0 0 8px rgba(109,40,217,0.4);}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) {text-shadow: 0 0 8px #a78bfa,0 0 18px #6d28d9;}
.maze-box:nth-child(20) {text-shadow:0 0 8px #7c3aed, 0 0 18px #4c1d95;}
.maze-box:nth-child(30) {text-shadow:0 0 10px #991b1b,0 0 25px #7f1d1d;}

/* Streak styling — Dominion */
.streak{display:inline-flex;align-items:center;gap:10px;font-weight:600;letter-spacing:0.5px;color: rgba(220,200,255,0.9);}

.streak-icon{width:22px;height:22px;object-fit:contain;border-radius:50%;filter: drop-shadow(0 0 8px rgba(160,120,255,0.8)) drop-shadow(0 0 16px rgba(120,60,255,0.6));
background: radial-gradient(circle,rgba(220,200,255,0.6) 0%,rgba(120,60,255,0.4) 45%,transparent 70%); animation: pulseControl 2.2s ease-in-out infinite;}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
=========================================
Controls visual display of rewards:
- artifact drop popup (after boss wins)
- artifact vault (persistent collection)
- locked vs unlocked states
- reward animations and glow effects
-----------------------------------------
SAFE TO EDIT:
- colors, backgrounds, borders
- artifact sizes and spacing
- glow effects and animations
- text labels and styling
-----------------------------------------
USE CAUTION:
- opacity (controls locked vs unlocked visibility)
- transform/scale (can affect layout spacing)
- animation timing (too fast = distracting)
-----------------------------------------
DO NOT MODIFY:
- .artifactSlot.unlocked (linked to JS unlock logic)
- element IDs (#artifactDrop, #artifactVault, etc.)
- display behavior (used for showing/hiding rewards)

Changing these may break:
- artifact unlocking visuals
- vault persistence feedback
-----------------------------------------
TIP:
This is your reward system.
If it doesn’t feel rewarding, engagement drops.
========================================= */
    
/* Reward popup — appears after boss victory */
#artifactDrop {margin-top: 20px;padding: 14px;background: radial-gradient(circle at center,rgba(76,29,149,0.35),
rgba(10,0,20,0.95));border-radius: 10px;border: 1px solid rgba(167,139,250,0.25);box-shadow:0 0 20px rgba(109,40,217,0.3),inset 0 0 25px rgba(127,29,29,0.2);text-align: center;}
    
/* Artifact image in popup */
#artifactImage { width: 96px; margin-bottom: 8px; }
#artifactDrop img { filter: drop-shadow(0 0 14px rgba(167,139,250,0.9)) drop-shadow(0 0 25px rgba(109,40,217,0.6)); }

/* Persistent artifact collection display (top panel) */
#artifactVault {margin-top: -6px;width: 220px;padding: 18px;border-radius: 12px;background: radial-gradient(circle at top, rgba(76,29,149,0.5), rgba(10,0,20,0.95));
border: 1px solid rgba(167,139,250,0.25);box-shadow:0 0 20px rgba(109,40,217,0.3),inset 0 0 30px rgba(127,29,29,0.2);text-align: center;}

#artifactVault h3 {color: #c4b5fd;text-shadow: 0 0 10px rgba(167,139,250,0.6);}

/* Layout container for artifact slots */
.vaultRow { display: flex; justify-content: center; align-items:flex-end; gap: 15px; flex-wrap:wrap;}

/* Individual artifact slot (default = locked state) */    
.artifactSlot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; text-align:center; opacity: .25; transition: all .4s ease;}

/* Locked artifact image (grayscale effect) */    
.artifactSlot img { width: 45px; margin-bottom:4px;filter: brightness(0.3) contrast(0.8);; transition: all .4s ease;}

/* Unlocked artifact — triggered by JS (DO NOT REMOVE) */    
.artifactSlot span { display: block; font-size: 13px; color: rgba(167,139,250,0.35); margin-top: 8px; line-height: 1.2; }

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked { opacity: 1; transform: scale(1.05); }
.artifactSlot.unlocked img {filter: drop-shadow(0 0 14px rgba(167,139,250,0.9)) drop-shadow(0 0 25px rgba(109,40,217,0.6));animation: relicPulse 2.5s ease-in-out infinite; backface-visibility: hidden;
  transform: translateZ(0);}
.artifactSlot.unlocked span {color: #ede9fe;font-weight: 600;text-shadow: 0 0 6px rgba(167,139,250,0.4);}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
=========================================
Controls visual intensity and immersion:
- boss animations (floating, shaking)
- boss-specific glow effects
- environmental effects (torches)
-----------------------------------------
SAFE TO EDIT:
- glow colors (match your theme)
- animation intensity and timing
- boss icon size
- torch placement and styling
-----------------------------------------
USE CAUTION:
- removing animations (reduces feedback and immersion)
- extreme sizing (can break layout)
- opacity/filter changes (affects visibility)
-----------------------------------------
DO NOT REMOVE:
- .boss-shake (triggered during boss hits)
- .bossIcon (used for boss rendering)
- .torch (environmental effect tied to game start)

Removing these will:
- eliminate combat feedback
- reduce visual clarity during bosses
-----------------------------------------
TIP:
This section controls how "intense" the game feels.
Subtle changes here dramatically affect experience.
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;}

/* Boss image display — includes floating animation */
.bossIcon { width: 96px; height: auto; display: block; margin: 0 auto 12px auto; animation: bossFloat 4s ease-in-out infinite; }

/* Boss-specific glow effects (safe to recolor per theme, change name before glow to match your boss name) */
.architectGlow {filter: drop-shadow(0 0 14px rgba(167,139,250,0.85)) drop-shadow(0 0 25px rgba(109,40,217,0.6));}
.pricemakerGlow {filter: drop-shadow(0 0 14px rgba(124,58,237,0.9)) drop-shadow(0 0 30px rgba(76,29,149,0.7));}
.finalBossGlow {filter: drop-shadow(0 0 18px rgba(153,27,27,0.95)) drop-shadow(0 0 35px rgba(127,29,29,0.8));}

/* Ambient torch effect — decorative, shown during gameplay */
.torch { position: absolute; width: 70px; top: 30px; z-index: 10; animation: torchFlicker 3s infinite alternate; pointer-events: none; opacity: .95; filter: drop-shadow(0 0 12px rgba(255,180,80,.7)); display:none; }

/* Torch positioning (left/right sides of screen) */
.left-torch { left: 18px; }
.right-torch { right: 18px; transform: scaleX(-1); }
/* =========================================
   8. FULLSCREEN SCREENS & TRANSITIONS — SAFE TO CUSTOMIZE
=========================================
Controls full-screen UI layers:
- start screen (game entry)
- hallway transition overlay (between rooms)
- transition text display
-----------------------------------------
SAFE TO EDIT:
- background images (start screen, hallway scenes)
- text styling and layout
- overlay colors and opacity
- animation timing and effects
-----------------------------------------
USE CAUTION:
- position: fixed (required for full-screen coverage)
- z-index layering (controls what appears on top)
- opacity / pointer-events (controls visibility + interaction)
-----------------------------------------
DO NOT REMOVE:
- #startScreen (entry point to game)
- #hallwayTransition + .active (transition system)
- #hallwayText (text container)

Removing these will break:
- game start flow
- transition animations
- progression continuity
-----------------------------------------
TIP:
This section controls immersion and pacing between actions.
Good transitions = smoother experience.
========================================= */

/* Fullscreen start screen — shown before game begins */    
#startScreen{
  position: fixed;
  inset: 0;
  background-image: url('start screen image.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 100;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow-y: auto;
  overflow-x: hidden;
  padding: 0px 20px;
  box-sizing: border-box;
}

/* Transition overlay — appears between rooms (controlled by JS) */
#hallwayTransition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hallway1.png'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 26px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.2s ease; animation: hallwayZoom 3.2s ease-out forwards; }

/* Activates transition visibility (DO NOT REMOVE) */    
#hallwayTransition.active { opacity: 1; }

/* Text container for transition messages */
#hallwayText { max-width: 600px; background: rgba(0,0,0,0.55); padding: 30px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(0,0,0,0.6); }

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
=========================================
Defines all animation keyframes used throughout the game:
- environmental effects (torch flicker)
- combat feedback (hit shake, boss shake)
- progression feedback (active pulse, victory glow)
- character motion (boss float, wizard float)
- reward effects (relic pulse)
- UI transitions (fade in/out)
-----------------------------------------
SAFE TO EDIT:
- animation intensity (scale, movement distance)
- timing (duration in CSS usage, not here)
- visual effects (glow, brightness, shadows)
-----------------------------------------
USE CAUTION:
- transform values (affects layout positioning)
- extreme motion (can feel distracting or chaotic)
- removing animations (reduces feedback clarity)
-----------------------------------------
DO NOT REMOVE:
- keyframe names (used across CSS and JS)
  e.g. torchFlicker, bossShake, activePulse, etc.

Renaming or deleting these will break:
- visual feedback
- boss effects
- UI transitions
-----------------------------------------
TIP:
Animations should reinforce feedback, not distract.
Subtle > excessive.
========================================= */

/* Ambient lighting effect (environmental immersion) */    
@keyframes torchFlicker { 0%, 100% { filter: brightness(1); } 25% { filter: brightness(1.05); } 50% { filter: brightness(0.97); } 75% { filter: brightness(1.04); } }

/* Damage feedback (quick impact effect) */    
@keyframes hitshake { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-6px); } 100% { transform: translateX(0); } }

    let totalWeight = 0;

    let weights = pool.map(q => {

        return { q, w };

        if(r <= 0){

        }
    }

}

{id:39,q:"An efficiency-equity tradeoff means...",options:["Both always increase","Improving fairness may reduce efficiency","Efficiency always rises","Markets ignore fairness"],a:1,tag:"equity",type:"interpretation",feedback:"Tradeoffs are real."},
{id:40,q:"Redistribution policies aim to...",options:["Increase efficiency","Increase equity","Increase monopoly power","Reduce demand"],a:1,tag:"equity",type:"interpretation",feedback:"Shift toward fairness."},
{id:41,q:"In an Edgeworth Box, gains from trade exist when...",options:["MRS is equal","MRS differs between individuals","Prices are equal","Utility is maximized"],a:1,tag:"efficiency",type:"definition",feedback:"Different MRS means mutually beneficial trades exist."},
{id:42,q:"If two individuals have identical MRS, what does this imply?",options:["Gains from trade exist","Allocation is inefficient","No further gains from trade","Prices must change"],a:2,tag:"efficiency",type:"interpretation",feedback:"Equal MRS means Pareto efficiency in exchange."},
{id:43,q:"A barrier to entry allows a firm to...",options:["Increase competition","Prevent new firms from entering","Reduce costs","Increase demand"],a:1,tag:"power",type:"definition",feedback:"Barriers protect market power."},
{id:44,q:"Which is an example of a barrier to entry?",options:["Low prices","Patents","High demand","Perfect information"],a:1,tag:"power",type:"interpretation",feedback:"Patents legally block entry."},
{id:45,q:"A firm charges an entry fee plus a per-unit price. This is called...",options:["Perfect competition","Two-part tariff","Price ceiling","Subsidy"],a:1,tag:"power",type:"definition",feedback:"Fixed fee + usage price."},
{id:46,q:"A two-part tariff allows firms to...",options:["Reduce output","Capture consumer surplus","Increase costs","Eliminate demand"],a:1,tag:"power",type:"interpretation",feedback:"Firms extract surplus via entry fee."}
],
medium:[
{id:50,q:"Demand for electric cars rises. Lithium batteries are an input. What happens to lithium prices?",options:["Fall","Rise","Stay constant","Become zero"],a:1,tag:"interaction",type:"interpretation",feedback:"Derived demand increases input prices."},
{id:51,q:"If wages rise in one industry, what happens to wages in competing labor markets?",options:["Rise","Fall","Stay constant","Double"],a:1,tag:"interaction",type:"trap",feedback:"Labor reallocation increases supply elsewhere—lowering wages."},
{id:52,q:"If P > MC in a competitive market, what should happen?",options:["Output decreases","Output increases","Nothing changes","Firms exit"],a:1,tag:"efficiency",type:"interpretation",feedback:"Value exceeds cost—expand production."},
{id:53,q:"A market is in equilibrium where P = 10 and MC = 6. Is this efficient?",options:["Yes","No, too little output","No, too much output","Cannot determine"],a:1,tag:"efficiency",type:"trap",feedback:"P > MC means underproduction."},
{id:54,q:"Two consumers have MRS of 2 and 6 for the same goods. What does this imply?",options:["Efficient allocation","No gains from trade","Gains from trade exist","Prices are equal"],a:2,tag:"efficiency",type:"interpretation",feedback:"Different valuations = trade opportunities."},
{id:55,q:"A monopolist has MR = 20 and MC = 25. What should it do?",options:["Increase output","Decrease output","Keep output constant","Raise price"],a:1,tag:"power",type:"calculation",feedback:"MR < MC → reduce output."},
{id:56,q:"A monopolist sets MR = MC. Why is price higher than MC?",options:["Costs increase","Must lower price to sell more units","Demand is flat","Government forces it"],a:1,tag:"power",type:"interpretation",feedback:"Price applies to all units sold."},
{id:57,q:"A monopolist perfectly price discriminates. What happens to output?",options:["Falls","Stays same","Rises to efficient level","Becomes zero"],a:2,tag:"power",type:"trap",feedback:"No DWL—efficient output restored."},
{id:58,q:"In Cournot competition, if one firm increases output, rivals will...",options:["Increase output","Decrease output","Exit","Do nothing"],a:0,tag:"strategy",type:"trap",feedback:"Strategic substitutes—reaction matters."},
{id:59,q:"In Bertrand competition with identical goods and MC = 5, what is equilibrium price?",options:["10","5","0","15"],a:1,tag:"strategy",type:"calculation",feedback:"Price = marginal cost."},
{id:60,q:"If firms become more differentiated, what happens to pricing?",options:["Falls to MC","Rises above MC","Becomes zero","Stays constant"],a:1,tag:"strategy",type:"interpretation",feedback:"Differentiation softens competition."},
{id:61,q:"An allocation is Pareto efficient. Can it still be unequal?",options:["No","Yes","Only with government","Only with monopoly"],a:1,tag:"equity",type:"trap",feedback:"Efficiency says nothing about fairness."},
{id:62,q:"Government redistributes income before trade. What happens?",options:["Inefficiency always","Efficient outcome still possible","Markets fail","Prices collapse"],a:1,tag:"equity",type:"interpretation",feedback:"Second Welfare Theorem."},
{id:63,q:"A firm ignores pollution costs when producing. What happens to output relative to the efficient level?",options:["Too low","Too high","Efficient","Zero"],a:1,tag:"failure",type:"interpretation",feedback:"External costs ignored → overproduction."},
{id:64,q:"A good is non-rival and non-excludable. What is the likely outcome?",options:["Overproduction","Efficient provision","Underproduction","Zero demand"],a:2,tag:"failure",type:"trap",feedback:"Free-riding leads to underprovision."},
{id:65,q:"One party in a transaction has more information than the other. What is the result?",options:["Efficiency","Perfect competition","Market failure","Equilibrium"],a:2,tag:"failure",type:"definition",feedback:"Information asymmetry disrupts markets."},
{id:66,q:"If social cost exceeds private cost, how does the market respond?",options:["Too little output","Too much output","Efficient output","No production"],a:1,tag:"failure",type:"interpretation",feedback:"Costs are understated → overproduction."},
{id:67,q:"Which situation creates deadweight loss?",options:["All beneficial trades occur","Some beneficial trades are prevented","Prices equal marginal cost","Supply equals demand"],a:1,tag:"failure",type:"trap",feedback:"Missed gains define DWL."},
{id:68,q:"A monopolist produces where MR = MC. Where is price determined?",options:["Supply curve","Demand curve","ATC curve","MC curve"],a:1,tag:"power",type:"interpretation",feedback:"Price comes from demand."},
{id:69,q:"A monopolist lowers price to sell more units. What happens to MR relative to price?",options:["MR = P","MR > P","MR < P","MR = 0"],a:2,tag:"power",type:"trap",feedback:"Price drop applies to all units."},
{id:70,q:"A monopolist produces Q where P = 20 and MC = 10. What does this imply?",options:["Efficient output","Underproduction","Overproduction","Zero profit"],a:1,tag:"power",type:"trap",feedback:"P > MC → too little output."},
{id:71,q:"A firm has falling ATC over all output levels. What structure is this?",options:["Perfect competition","Monopolistic competition","Natural monopoly","Oligopoly"],a:2,tag:"power",type:"definition",feedback:"Economies of scale dominate."},
{id:72,q:"A monopolist perfectly price discriminates. What is the outcome?",options:["Deadweight loss","Efficient output","Lower profits","Higher costs"],a:1,tag:"power",type:"interpretation",feedback:"All surplus captured, no DWL."},
{id:73,q:"A monopolist separates customers by willingness to pay. What is this called?",options:["Bundling","Price discrimination","Collusion","Regulation"],a:1,tag:"power",type:"definition",feedback:"Different prices for different groups."},
{id:74,q:"A monopolist charges a fixed fee plus per-unit price. What strategy is this?",options:["Market separation","Two-part pricing","Perfect competition","Limit pricing"],a:1,tag:"power",type:"definition",feedback:"Fee + usage pricing."},
{id:75,q:"In Cournot competition, firms react to rivals’ output. This makes output decisions...",options:["Independent","Strategic","Random","Fixed"],a:1,tag:"strategy",type:"interpretation",feedback:"Interdependence defines oligopoly."},
{id:76,q:"Cournot equilibrium output compared to monopoly is...",options:["Lower","Higher","Equal","Zero"],a:1,tag:"strategy",type:"trap",feedback:"More output than monopoly, less than competition."},
{id:77,q:"In Bertrand competition with MC = 10, what is equilibrium price?",options:["20","15","10","0"],a:2,tag:"strategy",type:"calculation",feedback:"Price equals marginal cost."},
{id:78,q:"Firms cannot expand output quickly in Bertrand competition. What happens to price?",options:["Falls to MC","Rises above MC","Becomes zero","Disappears"],a:1,tag:"strategy",type:"interpretation",feedback:"Capacity limits soften competition."},
{id:79,q:"Firms sell differentiated products. What happens to price competition?",options:["Intensifies","Weakens","Disappears","Becomes perfect"],a:1,tag:"strategy",type:"interpretation",feedback:"Less substitutability reduces pressure."},
{id:80,q:"A Nash equilibrium exists when...",options:["Firms cooperate","Each firm best responds","Prices are identical","Output is maximized"],a:1,tag:"strategy",type:"definition",feedback:"No incentive to deviate."},
{id:81,q:"In Stackelberg competition, why does the leader earn more?",options:["Lower costs","First-mover commitment","Better demand","Government support"],a:1,tag:"strategy",type:"interpretation",feedback:"Commitment shapes rival response."},
{id:82,q:"Collusion is harder to sustain when...",options:["Firms are patient","Few firms exist","Many firms exist","Repeated interaction occurs"],a:2,tag:"strategy",type:"trap",feedback:"More firms = harder coordination."},
{id:83,q:"An allocation is Pareto efficient if...",options:["Income is equal","No gains from trade remain","Output is maximized","Prices are stable"],a:1,tag:"efficiency",type:"definition",feedback:"No one can improve without harm."},
{id:84,q:"Moving to the contract curve implies...",options:["Inefficiency","All gains from trade realized","Lower output","Higher prices"],a:1,tag:"efficiency",type:"interpretation",feedback:"No wasted opportunities."},
{id:85,q:"An efficient allocation may still be undesirable because...",options:["Too much output","Unequal distribution","High prices","Low cost"],a:1,tag:"equity",type:"trap",feedback:"Efficiency ignores fairness."},
{id:86,q:"The Second Welfare Theorem suggests we can achieve equity by...",options:["Fixing prices","Redistributing endowments","Reducing output","Eliminating markets"],a:1,tag:"equity",type:"interpretation",feedback:"Adjust starting point, then trade."},
{id:87,q:"Government redistribution typically causes...",options:["Higher efficiency","Lower efficiency","No change","Perfect competition"],a:1,tag:"equity",type:"interpretation",feedback:"Distorts incentives."},
{id:88,q:"Markets prioritize...",options:["Fairness","Efficiency","Equality","Regulation"],a:1,tag:"equity",type:"definition",feedback:"They maximize surplus."},
{id:89,q:"Improving equity through taxation often leads to...",options:["Higher efficiency","Lower efficiency","No tradeoffs","Perfect outcomes"],a:1,tag:"equity",type:"trap",feedback:"Tradeoffs are unavoidable."},
{id:90,q:"Two individuals have MRS of 2 and 5 for the same goods. What does this imply?",options:["Efficient allocation","No gains from trade","Mutually beneficial trade exists","Prices are equal"],a:2,tag:"efficiency",type:"interpretation",feedback:"Different valuations → gains from trade."},
{id:91,q:"An allocation lies inside the Edgeworth Box but not on the contract curve. What is true?",options:["It is efficient","No trades remain","Gains from trade exist","Utility is maximized"],a:2,tag:"efficiency",type:"trap",feedback:"Not on contract curve → still inefficient."},
{id:92,q:"A firm maintains high profits because new firms cannot enter due to high startup costs. What explains this?",options:["Perfect competition","Barrier to entry","Externality","Efficiency"],a:1,tag:"power",type:"interpretation",feedback:"Barriers sustain market power."},
{id:93,q:"If barriers to entry are removed in a monopolized market, what is most likely?",options:["Prices rise","Prices fall toward marginal cost","Output falls","Demand disappears"],a:1,tag:"power",type:"interpretation",feedback:"Entry increases competition."},
{id:94,q:"A firm charges a low per-unit price but a high entry fee. What is the goal?",options:["Reduce demand","Capture consumer surplus","Increase marginal cost","Eliminate competition"],a:1,tag:"power",type:"interpretation",feedback:"Two-part tariff extracts surplus."},
{id:95,q:"If a two-part tariff sets price equal to marginal cost, what happens to output?",options:["Falls","Stays constant","Becomes efficient","Becomes zero"],a:2,tag:"power",type:"trap",feedback:"Usage price at MC → efficient quantity."}
], 
hard:[
{id:150,q:"A surge in demand for electric vehicles raises the price of lithium. Battery producers cut output, which then affects laptop production. What does this illustrate?",options:["A single-market adjustment only","General equilibrium spillovers across related markets","Monopoly pricing in batteries","A movement along the laptop demand curve"],a:1,tag:"interaction",type:"interpretation",feedback:"A shock in one market can cascade through related input and output markets."},
{id:151,q:"A new health study raises demand for tomatoes. Tomatoes and cucumbers are complements, and tomato farms hire more workers away from cucumber farms. What is the most likely long-run result?",options:["Tomato prices rise forever while cucumber prices never change","Tomato and cucumber markets both adjust as prices and wages change across markets","Only the tomato market changes because consumer demand began there","Worker wages are irrelevant because labor markets are separate"],a:1,tag:"interaction",type:"trap",feedback:"General equilibrium means product and labor markets adjust together."},
{id:152,q:"A tariff raises the domestic price of imported steel. Which downstream effect is most likely?",options:["Car supply shifts right because domestic firms gain certainty","Car supply shifts left because an input became more expensive","Car demand shifts right because steel is scarcer","Car prices must fall because steel producers earn more"],a:1,tag:"interaction",type:"interpretation",feedback:"Higher input costs reduce supply in industries using that input."},
{id:153,q:"Suppose coffee and pastries are complements. A productivity improvement lowers the cost of producing coffee. Which sequence is most plausible?",options:["Coffee supply rises, coffee price falls, demand for pastries rises","Coffee demand falls, pastry demand falls, both prices rise","Coffee price rises, pastry supply falls, labor exits both industries","Nothing happens outside the coffee market"],a:0,tag:"interaction",type:"default",feedback:"Lower coffee cost spills over into the complementary pastry market."},
{id:154,q:"An increase in demand for restaurant meals raises wages for cooks. Some workers leave retail jobs to become cooks. What happens first in retail labor markets?",options:["Retail labor supply falls, tending to raise retail wages","Retail labor supply rises, lowering retail wages","Retail output rises immediately because cooks consume more","Retail demand disappears because labor moved"],a:0,tag:"interaction",type:"trap",feedback:"Workers leaving retail reduce labor supply there, putting upward pressure on wages."},
{id:155,q:"Two industries use the same specialized chip. Demand for gaming consoles spikes, raising chip prices. A student says only console prices will change because laptops are a different market. What is wrong with that reasoning?",options:["Chip prices affect only consumers, not firms","Shared inputs link markets, so laptop production conditions also change","Laptop demand determines chip prices, not console demand","Different final goods can never be connected"],a:1,tag:"interaction",type:"trap",feedback:"Shared inputs are one of the clearest channels linking separate markets."},
{id:156,q:"If an economy moves from a point inside the PPF to a point on the PPF but not to the highest attainable indifference curve, what has improved?",options:["Allocative efficiency only","Technical efficiency only","Equity only","Nothing has improved"],a:1,tag:"efficiency",type:"interpretation",feedback:"Moving onto the PPF fixes waste in production, but not necessarily consumer satisfaction."},
{id:157,q:"At a candidate allocation, the slope of the PPF does not equal the slope of the indifference curve. What does that imply?",options:["Consumers and producers are perfectly aligned","The allocation is not allocatively efficient","The economy is inside the PPF","The market must be monopolized"],a:1,tag:"efficiency",type:"trap",feedback:"Efficiency requires opportunity cost to match willingness to trade."},
{id:158,q:"Two people trade goods until their MRS values are equal. What has been achieved?",options:["Equality of income","Pareto efficiency in exchange","Productive efficiency in production","A guarantee of fairness"],a:1,tag:"efficiency",type:"definition",feedback:"Equal MRS means no mutually beneficial trade remains."},
{id:159,q:"A competitive market clears, but at the equilibrium output P exceeds MC. What should we conclude?",options:["The market is efficient because quantity demanded equals quantity supplied","The market is underproducing relative to the efficient level","The market is overproducing because firms earn profit","Nothing can be concluded without ATC"],a:1,tag:"efficiency",type:"trap",feedback:"Market clearing alone is not enough. Efficiency requires P = MC."},
{id:160,q:"A good has price 18 and marginal cost 12 at the current output. What adjustment would move the market toward allocative efficiency?",options:["Reduce output because costs are positive","Increase output because willingness to pay exceeds marginal cost","Hold output constant because the market already clears","Raise fixed costs so ATC matches price"],a:1,tag:"efficiency",type:"calculation",feedback:"If P > MC, additional units are worth more than they cost to make."},
{id:161,q:"A planner chooses a point on the PPF that yields less utility than another feasible point on the same PPF. This point is...",options:["Productively and allocatively efficient","Productively efficient but allocatively inefficient","Allocatively efficient but technically inefficient","Pareto superior to all other points"],a:1,tag:"efficiency",type:"trap",feedback:"Being on the PPF does not guarantee the best mix of goods."},
{id:162,q:"Trade moves an economy from an initial endowment to a point on the contract curve. What is true at the final point?",options:["At least one more mutually beneficial trade still exists","No one can be made better off without harming someone else","The allocation must also be equitable","Each person has the same bundle"],a:1,tag:"efficiency",type:"interpretation",feedback:"The contract curve is the set of Pareto efficient allocations."},
{id:163,q:"A factory dumps waste into a river, and downstream fishers bear the damage. If the factory ignores that damage, which comparison is correct?",options:["Private cost equals social cost","Private cost exceeds social cost","Social cost exceeds private cost","Marginal benefit exceeds all costs automatically"],a:2,tag:"failure",type:"definition",feedback:"Unpriced external harm means social cost is higher than private cost."},
{id:164,q:"A city installs streetlights funded voluntarily. Many residents enjoy the lights whether or not they contribute, so contributions stay low. What market failure is this?",options:["Imperfect competition","Public goods underprovision due to free-riding","Natural monopoly","Efficient market separation"],a:1,tag:"failure",type:"interpretation",feedback:"Non-excludability and non-rivalry create free-rider problems."},
{id:165,q:"A student says a market with many buyers and sellers must be efficient. Which case most clearly disproves that claim?",options:["A perfectly competitive wheat market","A polluted river caused by factory output","A market with falling ATC","A firm entering because profits exist"],a:1,tag:"failure",type:"trap",feedback:"Externalities can destroy efficiency even when competition exists."},
{id:166,q:"If consumers cannot tell whether used cars are high or low quality, mutually beneficial trades may fail to occur. This is best classified as...",options:["A public good problem","Imperfect information causing market failure","A natural monopoly problem","A case of allocative efficiency"],a:1,tag:"failure",type:"interpretation",feedback:"Asymmetric information can block efficient exchange."},
{id:167,q:"Suppose the private marginal cost of a product is 8, but the external damage per unit is 5. What is the social marginal cost?",options:["3","8","13","40"],a:2,tag:"failure",type:"calculation",feedback:"Social marginal cost adds the external harm to private cost."},
{id:168,q:"A vaccine provides private benefit to the buyer and external benefit to others by reducing spread. If consumers ignore that external benefit, the market outcome will likely involve...",options:["Too much output","Too little output","Efficient output","A natural monopoly"],a:1,tag:"failure",type:"trap",feedback:"Positive externalities lead to underproduction relative to the social optimum."},
{id:169,q:"A monopolist faces demand P = 100 - Q and marginal cost MC = 20. At the profit-maximizing output, which condition must hold?",options:["P = MC","MR = MC","ATC = MC","Demand = supply"],a:1,tag:"power",type:"definition",feedback:"The monopoly still maximizes profit where marginal revenue equals marginal cost."},
{id:170,q:"A monopolist has demand P = 100 - Q and MC = 20. Marginal revenue is MR = 100 - 2Q. What is the profit-maximizing quantity?",options:["20","40","60","80"],a:1,tag:"power",type:"calculation",feedback:"Set MR = MC: 100 - 2Q = 20, so Q = 40."},
{id:171,q:"Using the previous monopoly setup with Q = 40, what price does the monopolist charge?",options:["20","40","60","80"],a:2,tag:"power",type:"calculation",feedback:"Plug Q = 40 into demand: P = 100 - 40 = 60."},
{id:172,q:"A student argues monopoly is inefficient only when the monopolist earns positive profit. What is wrong with that claim?",options:["Monopoly is inefficient whenever P > MC, even if profit is zero or negative","Any firm with zero profit is efficient","Profits determine whether MR equals MC","Monopoly is efficient if fixed costs are high"],a:0,tag:"power",type:"trap",feedback:"The inefficiency comes from output restriction, not from accounting profit alone."},
{id:173,q:"A monopolist can perfectly price discriminate. Compared with single-price monopoly, output will...",options:["Fall because each unit gets a different price","Stay the same because market power is unchanged","Rise to the efficient level where willingness to pay equals MC","Become lower than competitive output"],a:2,tag:"power",type:"interpretation",feedback:"Perfect price discrimination removes deadweight loss by expanding output."},
{id:174,q:"A movie theater charges students less than non-students for the same showing. For this to work as profit-maximizing price discrimination, the theater must be able to...",options:["Eliminate all fixed costs","Prevent resale and separate customer groups","Make demand perfectly elastic","Force both groups to buy the same quantity"],a:1,tag:"power",type:"interpretation",feedback:"Price discrimination requires segmentation and limited arbitrage."},
{id:175,q:"A utility company is regulated under marginal-cost pricing even though marginal cost is below average cost. What is the likely result?",options:["The firm earns excess profit","The firm incurs losses unless subsidized","The firm produces too little","The firm becomes perfectly competitive"],a:1,tag:"power",type:"trap",feedback:"For a natural monopoly, P = MC can imply price below AC."},
{id:176,q:"A monopolist charges an entry fee plus a per-unit price equal to marginal cost. Why can this raise profit?",options:["It creates deadweight loss on purpose","It captures consumer surplus through the fixed fee while keeping usage high","It forces resale","It makes demand more elastic"],a:1,tag:"power",type:"trap",feedback:"Two-part pricing can mimic some gains from price discrimination."},
{id:177,q:"In a two-firm Cournot market, each firm chooses output knowing total output affects price. Why is the Cournot outcome not as restrictive as monopoly?",options:["Each firm ignores the effect of its output on the other firm’s profit","Each firm sets price equal to MC directly","Collusion is legally required","Demand becomes perfectly elastic"],a:0,tag:"strategy",type:"trap",feedback:"Each firm internalizes only part of the price effect, so total output exceeds monopoly output."},
{id:178,q:"In Bertrand competition with identical goods and constant MC, why does price tend to fall to marginal cost?",options:["Each firm can gain the whole market by slightly undercutting a higher rival price","Firms coordinate on the monopoly price","Consumers prefer the highest price","Output is fixed by assumption"],a:0,tag:"strategy",type:"interpretation",feedback:"Undercutting pressure drives price down until no profitable cut remains."},
{id:179,q:"Two Bertrand firms sell differentiated goods. One firm raises its price. What is the best-response logic for the rival?",options:["Also tends to raise price because some consumers shift toward it","Must cut price to zero immediately","Must exit because demand becomes negative","Faces no change in demand"],a:0,tag:"strategy",type:"interpretation",feedback:"Differentiation softens competition and makes upward-sloping best responses possible."},
{id:180,q:"A cartel agreement in a repeated game is easier to sustain when...",options:["There are many firms and little chance of future interaction","Firms are patient and expect the game to continue","Products are homogeneous and one-shot","Detection of cheating takes longer and firms are impatient"],a:1,tag:"strategy",type:"trap",feedback:"Patience and future punishment make collusion more stable."},
{id:181,q:"Suppose a grim-trigger collusive arrangement requires g ≥ 1/2 to deter cheating. If g = 0.4, what follows?",options:["Collusion is stable","Cheating is profitable, so collusion is not sustainable","Price must equal monopoly price forever","Cournot output becomes efficient"],a:1,tag:"strategy",type:"calculation",feedback:"If continuation is too unlikely, future punishment is too weak."},
{id:182,q:"In a Stackelberg model, the leader commits to output first. Why does the leader often earn more than the follower?",options:["The follower must match output exactly","The leader chooses output anticipating the follower’s best response","The leader faces a flatter demand curve","The follower is forced to price at MC"],a:1,tag:"strategy",type:"interpretation",feedback:"Commitment gives the leader a strategic advantage."},
{id:183,q:"An incumbent threatens a low price to deter entry, but the low price can be reversed immediately after entry decisions are made. Why may this threat fail?",options:["Price is not a sunk commitment","Demand becomes perfectly inelastic","Entry never depends on expected future prices","Incumbents cannot lower prices"],a:0,tag:"strategy",type:"trap",feedback:"Without commitment, limit pricing threats may not be credible."},
{id:184,q:"Two firms play Bertrand with MC = 12 and identical goods. If both charge 18, what profitable deviation exists for one firm?",options:["Raise price to 20","Lower price slightly below 18 to capture the market","Keep price unchanged because 18 is Nash","Set price below 12 permanently"],a:1,tag:"strategy",type:"trap",feedback:"Any price above MC invites undercutting in the homogeneous Bertrand model."},
{id:185,q:"An allocation on the contract curve gives one person much more than the other. Which statement is correct?",options:["It is inefficient because the bundles are unequal","It may be efficient even though it is inequitable","It must be both fair and efficient","It cannot result from voluntary trade"],a:1,tag:"equity",type:"trap",feedback:"Pareto efficiency does not guarantee fairness."},
{id:186,q:"A social planner wants a fairer outcome without sacrificing the efficiency of competitive trade. According to the Second Welfare Theorem, the best general approach is to...",options:["Fix all market prices directly","Redistribute initial endowments, then allow competitive trade","Ban voluntary exchange","Require equal quantities of all goods"],a:1,tag:"equity",type:"interpretation",feedback:"Separate distribution from the trading process itself."},
{id:187,q:"Suppose Smith would never voluntarily trade from his initial endowment to the planner’s preferred allocation, even though the planner views it as fair. What core problem does this illustrate?",options:["Efficiency automatically creates equity","Equity goals may require coercion or redistribution of endowments","Markets cannot reach the contract curve","All fair allocations are inefficient"],a:1,tag:"equity",type:"trap",feedback:"Fairness often cannot be imposed through voluntary trade alone."},
{id:188,q:"A tax-transfer policy reduces inequality but also discourages work effort and shrinks total surplus. This is an example of...",options:["A Pareto improvement","An efficiency-equity tradeoff","A failure of monopoly regulation","A proof that fairness is impossible"],a:1,tag:"equity",type:"interpretation",feedback:"Improving distribution can come at the cost of efficiency."},
{id:189,q:"An outcome is Pareto efficient, but one person holds nearly all resources. What can we conclude?",options:["The outcome must be socially desirable","The outcome is efficient, but society may still reject it on equity grounds","The outcome is inefficient because wealth is concentrated","The contract curve has been violated"],a:1,tag:"equity",type:"default",feedback:"Efficiency answers one question. Fairness answers another."},
{id:190,q:"Two individuals trade until their MRS are equal. What does this guarantee?",options:["Equal income","Pareto efficiency","Maximum production","Perfect equality"],a:1,tag:"efficiency",type:"definition",feedback:"No further gains from trade remain."},
{id:191,q:"An allocation is on the contract curve but highly unequal. What is true?",options:["It is inefficient","It is efficient but may be inequitable","It must be fair","Trade must stop"],a:1,tag:"equity",type:"trap",feedback:"Efficiency does not imply fairness."},
{id:192,q:"A monopolist earns persistent profit because of patents and control of key resources. What is the source of power?",options:["Demand shifts","Barriers to entry","Efficiency","Elasticity"],a:1,tag:"power",type:"interpretation",feedback:"Barriers prevent competition."},
{id:193,q:"If barriers to entry suddenly disappear in a monopoly market, what happens in the long run?",options:["Prices rise","Prices fall and output increases","Demand disappears","Costs rise"],a:1,tag:"power",type:"multi-step",feedback:"Entry erodes market power."},
{id:194,q:"A monopolist charges P = MC and a fixed entry fee equal to consumer surplus. What is the result?",options:["Deadweight loss","Efficient output and full surplus extraction","Zero output","Perfect competition"],a:1,tag:"power",type:"trap",feedback:"Two-part tariff can achieve efficiency while capturing surplus."},
{id:195,q:"Why is a two-part tariff often more profitable than a single price monopoly?",options:["It reduces costs","It increases demand","It captures more consumer surplus","It eliminates competition"],a:2,tag:"power",type:"interpretation",feedback:"Firms extract surplus beyond per-unit pricing."}   
]
};

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id
		q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMonopolyCalc(){
    let a = rand(80,140);
    let b = rand(1,3);
    let mc = rand(10,40);
    let q = Math.floor((a - mc) / (2*b));
    let price = a - b*q;
    return {
        q:`A monopolist faces demand P = ${a} - ${b}Q and MC = ${mc}.
What price will the firm charge?`,
        options:[
            `$${mc}`,
            `$${price}`,
            `$${a}`,
            `$${a - b*(q+5)}`
        ],
        a:1,
        tag:"power",
        type:"calculation",
        feedback:"MR = MC → solve Q → plug into demand. Most stop too early."
    };
}

function getSpilloverChain(){
    const goods = [
        {base:"housing", input:"lumber", downstream:"furniture"},
        {base:"cars", input:"steel", downstream:"appliances"},
        {base:"smartphones", input:"chips", downstream:"laptops"},

    let pick = goods[Math.floor(Math.random()*goods.length)];

    return {
        q:`Demand for ${pick.base} increases sharply. Production expands, raising the price of ${pick.input}.
What is the MOST likely effect in the ${pick.downstream} market?`,
        options:[
            `${pick.downstream} production costs rise, shifting supply left`,
            `${pick.downstream} demand rises directly`,

        feedback:"Input cost increases ripple outward, reducing supply in downstream markets."
    };
}

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

// Breaking this WILL cause:
// - multiple tracks playing at once
// - music not switching correctly
//
// This system manages audio state transitions.
// =============================================     
let currentMusic = null;

// Stops all music tracks (called before switching states)
// Do not remove — prevents audio overlap     
function stopAllMusic(){
    if(bgMusic) bgMusic.pause();
    if(bossMusic) bossMusic.pause();
    if(finalBossMusic) finalBossMusic.pause();
}

// Plays exploration (default) music
// Skips if already playing to prevent restart spam     
function playExplorationMusic(){
    if(currentMusic === "exploration") return;
    stopAllMusic();
    bgMusic.play();
    currentMusic = "exploration";
}

// Plays boss encounter music
// Automatically stops other tracks first     
function playBossMusic(){
    if(currentMusic === "boss") return;
    stopAllMusic();
    bossMusic.play();
    currentMusic = "boss";
}

// Plays final boss music (highest priority state)
// Overrides all other music     
function playFinalBossMusic(){
    if(currentMusic === "finalBoss") return;
    stopAllMusic();
    finalBossMusic.play();
    currentMusic = "finalBoss";
}

// =============================================
// MAIN GAME LOOP — DO NOT MODIFY
// =============================================
// Controls:
// - what question appears
// - boss encounters
// - difficulty scaling
// - UI updates
//
// This is the heart of the game.
// Changing logic here will break progression.
     
function loadQuestion() {
    questionStartTime = Date.now();
    updateMazeTrack();
    const questionElement = document.getElementById("question");
    const msgElement = document.getElementById("message");
    const gameBox = document.getElementById("gameBox");
    const bossMsg = document.getElementById("bossMessage");

    document.getElementById("artifactDrop").style.display = "none";

    // 1. Determine Difficulty and Boss Status
    let diff = (room <= 9) ? "easy"
             : (room === 10) ? "easyBoss"
             : (room <= 19) ? "medium"
             : (room === 20) ? "mediumBoss"
             : (room <= 25) ? "hard"
             : (room <= 29) ? "calculation"
             : "finalBoss";

   const isBoss = diff.includes("Boss");

   // Only reset health if the bossPool is currently empty (meaning a new encounter)
   if (isBoss && (!bossPool || bossPool.length === 0)) {
    bossHealth = 3;
   }

    // --- MUSIC CONTROL ---
    if(diff === "finalBoss"){
        playFinalBossMusic();
    }
    else if(diff.includes("Boss")){
        playBossMusic();
    }
    else{
        playExplorationMusic();
    }

   const shell = document.getElementById("gameShell");

    // SINGLE SOURCE OF TRUTH
    shell.classList.toggle("boss-mode", isBoss);
    gameBox.classList.toggle("boss-mode", isBoss);

    // 2. UI & Progress Updates
    gameBox.classList.toggle("boss-mode", isBoss);
    document.getElementById("progressFill").style.width = (room / 30 * 100) + "%";
    document.getElementById("areaDisplay").innerText = `${getAreaName(room)} (${room}/30)`;
    document.getElementById("srAnnouncements").innerText = `Entering ${getAreaName(room)}. Room ${room} of 30.`;

   // 3. Select the Question
   if (isBoss) {
        // 1. If it's a new fight (Health 3), decide the "Theme" of the boss
        if (bossHealth === 3 || !bossPool || bossPool.length === 0) {
            const bank = [...questionBanks[diff]];
            let entries = Object.entries(conceptMemory || {});
            let chosenTag = null;

            if (entries.length > 0) {
                entries.sort((a, b) => b[1] - a[1]);
                chosenTag = entries[0][0];
            }

            bossPool = chosenTag 
                ? bank.filter(q => q.tag === chosenTag) 
                : [];

            if (bossPool.length < 3) {
                bossPool = bank.slice(0, 3);
            }
        }

        // 2. Select the specific question based on boss health
        currentQuestion = shuffleOptions(bossPool[3 - bossHealth]);

      // 3. Boss Identity UI (Logic moved ABOVE the return)
       let bTitle = room === 10 ? "THE ARCHITECT OF EQUILIBRIUM"
               : room === 20 ? "THE PRICE MAKER"
               : "THE GRAND STRATEGIST";

       let bColor = room === 10 ? "#a78bfa"
               : room === 20 ? "#7c3aed"
               : "#991b1b";

    document.getElementById("srAnnouncements").innerText = `Boss encounter. ${bTitle}. Prepare yourself`;
    bossMsg.innerText = "⚠ BOSS ENCOUNTER ⚠";
    bossMsg.style.color = bColor;
    gameBox.style.setProperty('--bossColor', bColor);

    let bossImage = "";
    let bossClass = "";

// =============================================
// BOSS VISUAL CONFIGURATION — SAFE TO EDIT
// =============================================
// Change:
// - boss images
// - boss class
//
// Keep room numbers (10, 20, 30) intact.
// =============================================
      
    if(room === 10){
        bossImage = "architect.png";
        bossClass = "architectGlow";
    }
    else if(room === 20){
        bossImage = "price_maker.png";
        bossClass = "pricemakerGlow";
    }
    else{
        bossImage = "strategist.png";
        bossClass = "finalBossGlow";
    }

        questionElement.innerHTML = `
            <img src="${bossImage}" class="bossIcon ${bossClass}">
            <span class="boss-title" style="color:${bColor}">${bTitle}</span>
            <div class="boss-q" style="--bossColor:${bColor}">
                ${currentQuestion.q}
            </div>`;

        // 4. THE CORRECT PLACEMENT OF RETURN
        // We draw the UI first, THEN we exit the function.
        displayQuestion(); 
        return; 

    } else {

        // --- STREAK ADAPTIVE LOGIC ---
        let adjustedDiff = diff;

        // --- FIND STRONGEST AREA (lowest weakness) ---
        let strongestTag = null;
        let lowestValue = Infinity;

        for(let tag in conceptMemory){
            if(conceptMemory[tag] < lowestValue){
                lowestValue = conceptMemory[tag];
                strongestTag = tag;
            }
        }

        // --- ADAPTIVE ESCALATION ---
        if(streak >= 8 && lowestValue < 1.5 && room < 25){
            adjustedDiff = "hard";
        }
        else if(streak >= 5 && lowestValue < 2.5 && room < 20){
            adjustedDiff = "medium";
        }

        // --- QUESTION SELECTION ---
        if(adjustedDiff === "calculation"){
            const generator = pickCalcGenerator();
            currentQuestion = shuffleOptions(generator());
        }
        else if(adjustedDiff === "hard" && strongestTag){
            currentQuestion = shuffleOptions(
                getAdaptiveQuestion(adjustedDiff, strongestTag)
            );
        }
        else{
            currentQuestion = shuffleOptions(
                getAdaptiveQuestion(adjustedDiff)
            );
        }

        // --- WIZARD LOGIC ---
        if(!currentQuestion.type){
            currentQuestion.type = "interpretation";
        }

        const wizardText = getWizardLine(currentQuestion.type);
        wizardSpeak(wizardText);

        bossMsg.innerText = (room === 9 || room === 19 || room === 29)
            ? "⚠️ DANGER: BOSS DETECTED IN NEXT ROOM ⚠️"
            : "";
        bossMsg.style.color = "#ef4444";

        questionElement.innerHTML = `
            <div>${currentQuestion.q}</div>
        `;
    }

    // 4. Update Hints and Draw Buttons
    document.getElementById("formulaHint").innerText = currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";
    displayQuestion();

    // --- Final Boss Entrance Shake ---
    if(diff === "finalBoss"){
        setTimeout(()=>{
            triggerBossShake();
            setTimeout(triggerBossShake,450);
        },200);
    }
}

function displayQuestion() {
    const optionsElement = document.getElementById("answers");
    optionsElement.innerHTML = "";

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.setAttribute("aria-label",`Answer option: ${option}`);
        btn.onclick = () => answer(index);
        optionsElement.appendChild(btn);
    });
}

// =============================================
// ANSWER HANDLER — CRITICAL SYSTEM
// =============================================
// Controls:
// - correct/incorrect logic
// - streaks
// - setbacks
// - boss damage
// - adaptive memory updates
//
// DO NOT MODIFY unless you understand:
// - conceptMemory
// - detour system
// - progression penalties
//
// Check for artifact names and CHANGE
     
function answer(choice) {
    // --- GLOBAL MEMORY DECAY ---
    for(let tag in conceptMemory){
    conceptMemory[tag] *= 0.95;
    }
   
    totalAttempts++;
   
    const isBossRoom = (room === 10 || room === 20 || room === 30);
    const msgElement = document.getElementById("message");
    const wizard = document.getElementById("wizardImage");
    const isCorrect = (choice === currentQuestion.a);

    // =============================================
    // 🔥 UPDATE STREAK FIRST (SOURCE OF TRUTH)
    // =============================================
    if (isCorrect) {
        streak++;
        if (streak > maxStreak) maxStreak = streak;
    } else {
        streak = 0;
    }
   
    // =============================================
    // 🔥 TRACK EVERYTHING (ONE LOCATION ONLY)
    // =============================================
    sendGameData({
        game: "The Dominion of Power",
        event: "question",
        user: username || "anonymous",
        room: room,
        question: currentQuestion.id || "unknown",
        correct: isCorrect ? 1 : 0,
        tag: currentQuestion.tag || "none",
        type: currentQuestion.type || "none",
        responseTime: Date.now() - questionStartTime,
	     attempt: totalAttempts ?? 0,
		  streak: streak ?? 0,
		  elapsedTime: startTime ? (Date.now() - startTime) : 0
    });

    // =============================================
    // ✅ CORRECT ANSWER LOGIC
    // =============================================
    if (isCorrect) {
        if(isBossRoom){
        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;

        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;
        sfxBossHit.play().catch(()=>{});
    } else {
        sfxBossHit.pause();
        sfxBossHit.currentTime = 0;

        sfxCorrect.pause();
        sfxCorrect.currentTime = 0;
        sfxCorrect.play().catch(()=>{});
    }
        wizardSpeak(getWizardFeedback("correct"));
       
        wizard.style.transform = "scale(1.1)";
        setTimeout(()=>{
        wizard.style.transform = "";
        },200);
       
        // If this was a concept detour question, return player to main path
        if(detourActive){
           detourActive = false;
           msgElement.innerHTML = `<span class='fade-out-text'>Correct! Concept restored. Moving deeper...</span>`;
           room = Math.min(room + 1, detourReturnRoom);
           localStorage.setItem("gauntletRoom", room);
           setTimeout(loadQuestion, TIMING.normal);
           return;
    }
        correctAnswers++;
        handleStreakVisuals();
    
        // --- LEARNING: reduce weakness ---
        if(currentQuestion.tag){
            conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) * 0.7;
        }
        
       // --- BOSS HIT LOGIC ---
        if(isBossRoom){
        bossHealth--;
        
        msgElement.innerHTML = `<span style='color:#f87171;font-weight:bold;'>⚔ HIT! Boss Health: ${bossHealth}/3</span>`;
        triggerBossShake();
        
        if (bossHealth > 0) {
           setTimeout(loadQuestion, TIMING.boss);
           return;
        }
         // Boss defeated
         sendGameData({
            game: "The Strategic Vault",
            event: "boss_defeated",
            user: username,
            room: room
         });
           
         bossPool = [];
           
        // Boss defeated (CHANGE ARTIFACT NAMES)
        if(room === 10){
        document.getElementById("vaultOrb").classList.add("unlocked");
        localStorage.setItem("vaultOrb", "true");
        showArtifact(artifacts.orb.img, artifacts.orb.title, artifacts.orb.text);
        }

        if(room === 20){
        document.getElementById("vaultCrown").classList.add("unlocked");
        localStorage.setItem("vaultCrown", "true");
        showArtifact(artifacts.crown.img, artifacts.crown.title, artifacts.crown.text);
        }

        if(room === 30){
        document.getElementById("vaultEdge").classList.add("unlocked");
        localStorage.setItem("vaultEdge", "true");
        showArtifact(artifacts.edge.img, artifacts.edge.title, artifacts.edge.text);
        }

// ... (Inside the Boss Victory check)
        showKnowledgeRoom(room);
           
        bossHealth = 3;
        bossPool = []; // Clear the pool so the next boss is fresh
        return; 
    } // <--- THIS ends the "if(isBossRoom)" block

    // --- NORMAL ROOM PROGRESSION ---
    // This code ONLY runs if choice === currentQuestion.a 
    // AND it wasn't a Boss Room (or a Detour).
   msgElement.innerHTML = "";
   room++;
   localStorage.setItem("gauntletRoom", room);
   showHallwayTransition(currentQuestion.feedback);
   return;
    }
  // =============================================
    // ❌ WRONG ANSWER LOGIC
    // =============================================

    if (isBossRoom) {
        sfxWrong.volume = 0.7;
    } else {
        sfxWrong.volume = 0.5;
    }

    sfxWrong.currentTime = 0;
    sfxWrong.play().catch(() => {});

    wizardSpeak(getWizardFeedback("wrong"));

    wizard.style.transform = "translateX(-6px)";
    setTimeout(() => {
        wizard.style.transform = "translateX(6px)";
        setTimeout(() => {
            wizard.style.transform = "";
        }, 100);
    }, 100);

    // --- LEARNING: increase weakness ---
    if (currentQuestion.tag) {
        conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) + 1;
    }

    // --- DETOUR TRIGGER ---
    if (!detourActive && currentQuestion.tag && (conceptMemory[currentQuestion.tag] || 0) >= 2) {

        let conceptPool = null;

        if (room <= 9 && easyConceptPools[currentQuestion.tag]) {
            conceptPool = easyConceptPools[currentQuestion.tag];
        }

        if (room >= 11 && room <= 19 && mediumConceptPools[currentQuestion.tag]) {
            conceptPool = mediumConceptPools[currentQuestion.tag];
        }

        if (conceptPool) {
            detourActive = true;
            detourReturnRoom = room;

            currentQuestion = shuffleOptions(pickConceptQuestion(conceptPool));

            document.getElementById("question").innerText = "Concept Check: " + currentQuestion.q;
            document.getElementById("formulaHint").innerText =
                currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

            msgElement.innerHTML = `<span class='fade-out-text'>You falter… The dominion demands a concept check.</span>`;

            displayQuestion();
            return;
        }
    }

    // --- FALLBACK LOGIC ---
    document.getElementById("streakDisplay").innerText = "";

    bossHealth = 3;
    bossPool = [];

    const bossRooms = [10, 20, 30];

    let fallback = (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1));
    let newRoom = room - fallback;

    while (bossRooms.includes(newRoom)) {
        newRoom++;
    }

    room = Math.max(1, newRoom);
    localStorage.setItem("gauntletRoom", room);

    alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);

    loadQuestion();
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|DOMINION66`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "DOM-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Regulator`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
